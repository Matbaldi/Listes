<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — Listes de souhait</title>
    <link rel="icon" href="../assets/icones/icone.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="../css/admin.css" rel="stylesheet" />
</head>

<body>
    <h5 class="mt-3 ms-md-5 ms-3">
        <a class="home-link" href="../index.html">
            <svg fill="#a0a0a0" width="1.4em" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <g stroke-width="0"></g>
                <g stroke-linecap="round" stroke-linejoin="round"></g>
                <g>
                    <line x1="21" y1="12" x2="3" y2="12"
                        style="fill: none; stroke: #a0a0a0; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2;">
                    </line>
                    <polyline points="6 9 3 12 6 15"
                        style="fill: none; stroke: #a0a0a0; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2;">
                    </polyline>
                </g>
            </svg>
            Retourner à l'accueil
        </a>
    </h5>

    <h1 class="mt-4 text-center">Administration</h1>
    <h2 class="mt-2 text-center mb-4">Gère les catégories et les articles de la liste.</h2>

    <!-- Vue connexion -->
    <div id="login-view" class="container" style="max-width: 380px;">
        <div class="card mt-4 p-4">
            <label class="form-label mt-2" for="login-user">Identifiant</label>
            <input id="login-user" type="text" class="form-control" autocomplete="username">

            <label class="form-label mt-3" for="login-pass">Mot de passe</label>
            <input id="login-pass" type="password" class="form-control" autocomplete="current-password">

            <button id="login-submit" class="btn btn-primary mt-4 w-100">Se connecter</button>
            <div id="login-error" class="alert alert-danger text-center mt-3 mb-0 d-none" role="alert">Identifiants
                incorrects.</div>
        </div>
    </div>

    <!-- App admin (masquée tant qu'on n'est pas connecté) -->
    <div id="admin-app" class="container mt-2 mb-5 d-none">
        <ul class="nav nav-tabs" id="admin-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-categories-btn" data-bs-toggle="tab"
                    data-bs-target="#tab-categories" type="button" role="tab" aria-selected="true">Catégories</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-items-btn" data-bs-toggle="tab" data-bs-target="#tab-items"
                    type="button" role="tab" aria-selected="false">Items</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Onglet Catégories -->
            <div class="tab-pane fade show active pt-4" id="tab-categories" role="tabpanel">
                <div class="d-flex justify-content-end mb-3">
                    <button type="button" class="btn btn-primary" id="add-category-btn">+ Ajouter une catégorie</button>
                </div>
                <div id="categories-row" class="row row-cols-1 row-cols-sm-3 row-cols-md-4 g-4"></div>
            </div>

            <!-- Onglet Items -->
            <div class="tab-pane fade pt-4" id="tab-items" role="tabpanel">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
                    <select id="items-filter" class="form-select" style="max-width: 280px;">
                        <option value="">Toutes les catégories</option>
                    </select>
                    <button type="button" class="btn btn-primary" id="add-item-btn">+ Ajouter un article</button>
                </div>
                <div id="items-row" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
            </div>
        </div>
    </div>

    <!-- Modale Catégorie -->
    <div class="modal fade" id="category-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="category-modal-title">Ajouter une catégorie</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="category-id">

                    <label class="form-label" for="category-name">Nom</label>
                    <input type="text" id="category-name" class="form-control" placeholder="ex : Jeux NES">

                    <label class="form-label mt-3" for="category-alt">Texte alternatif de l'image</label>
                    <input type="text" id="category-alt" class="form-control" placeholder="ex : Logo NES">

                    <label class="form-label mt-3" for="category-url">URL de l'image</label>
                    <input type="text" id="category-url" class="form-control"
                        placeholder="./assets/images/logo_nes.webp">

                    <img id="category-preview" class="admin-preview d-none" alt="Aperçu">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" id="category-save-btn">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modale Item -->
    <div class="modal fade" id="item-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="item-modal-title">Ajouter un article</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="item-id">

                    <label class="form-label" for="item-platform">Catégorie</label>
                    <select id="item-platform" class="form-select"></select>

                    <label class="form-label mt-3" for="item-name">Nom</label>
                    <input type="text" id="item-name" class="form-control" placeholder="ex : Super Mario 64">

                    <label class="form-label mt-3" for="item-price">Prix</label>
                    <input type="text" id="item-price" class="form-control" placeholder="ex : 25-30€">

                    <label class="form-label mt-3" for="item-alt">Texte alternatif de l'image</label>
                    <input type="text" id="item-alt" class="form-control" placeholder="ex : Cartouche Super Mario 64">

                    <label class="form-label mt-3" for="item-url">URL de l'image</label>
                    <input type="text" id="item-url" class="form-control" placeholder="https://...">

                    <label class="form-label mt-3" for="item-date">Date de sortie (optionnel)</label>
                    <input type="text" id="item-date" class="form-control" placeholder="ex : 12/12/2025">

                    <img id="item-preview" class="admin-preview d-none" alt="Aperçu">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" id="item-save-btn">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="../js/admin.js"></script>
</body>

</html>
